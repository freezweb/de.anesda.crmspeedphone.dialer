name: speedphone_dialer
description: Mobile Begleit-App für CRM SpeedPhone.
publish_to: "none"
version: 1.1.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  mobile_scanner: ^7.0.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#052F68"
  adaptive_icon_foreground: assets/icon/app_icon.png
  min_sdk_android: 24
